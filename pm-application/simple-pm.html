<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <div class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <h1 class="text-2xl font-bold text-gray-900">PM Application</h1>
                    <span class="px-2 py-1 bg-blue-100 text-blue-800 text-sm rounded-full">Project Management System</span>
                </div>
                <div class="flex space-x-3">
                    <button onclick="window.location.href='http://localhost:5000'" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">
                        ← Back to RDC Main App
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Projects List -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-lg shadow p-6">
                        <h2 class="text-xl font-semibold mb-6">Available Projects</h2>
                        <div class="space-y-3">
                            <div class="border rounded-lg p-4 hover:bg-gray-50 cursor-pointer">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="font-medium text-gray-900">Test Project</h3>
                                        <p class="text-sm text-gray-600 mt-1">Project Management System</p>
                                    </div>
                                    <span class="px-2 py-1 bg-green-100 text-green-800 text-xs rounded-full">Active</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Stats -->
                <div class="space-y-6">
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="font-semibold mb-4">Quick Stats</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between">
                                <span class="text-gray-600">Total Projects</span>
                                <span class="font-medium">1</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">Templates Available</span>
                                <span class="font-medium">1</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="font-semibold mb-4">PM Application</h3>
                        <p class="text-sm text-gray-600 mb-4">Standalone Project Management System with persistent storage.</p>
                        <div class="space-y-2">
                            <div class="flex items-center text-sm">
                                <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                                <span>Database: Connected</span>
                            </div>
                            <div class="flex items-center text-sm">
                                <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
                                <span>API: Running on port 3001</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('PM Application loaded successfully!');
    </script>
</body>
</html>
