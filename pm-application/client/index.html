        // INTERNATIONALIZATION: Locale detection and switching
        function detectLocale() {
            // Check for saved preference
            const saved = localStorage.getItem('pm_locale');
            if (saved && translations[saved]) {
                return saved;
            }
            
            // Check browser language
            const browserLang = navigator.language.split('-')[0];
            if (translations[browserLang]) {
                return browserLang;
            }
            
            // Default to English
            return 'en';
        }
        
        // INTERNATIONALIZATION: Set locale
        function setLocale(locale) {
            if (translations[locale]) {
                currentLocale = locale;
                localStorage.setItem('pm_locale', locale);
                
                // Update document direction for RTL languages
                if (locale === 'ar' || locale === 'he') {
                    document.documentElement.dir = 'rtl';
                } else {
                    document.documentElement.dir = 'ltr';

                // Trigger re-render

        // ACCESSIBILITY: Modal and focus management utilities
        let previousActiveElement = null;
        let modalStack = [];

        // Focus management for accessibility
        function trapFocus(element) {
            const focusableElements = element.querySelectorAll(
                'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
            );
            const firstElement = focusableElements[0];
            const lastElement = focusableElements[focusableElements.length - 1];

            element.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    if (e.shiftKey) {
                        if (document.activeElement === firstElement) {
                            e.preventDefault();
                            lastElement.focus();
                        }
                    } else {
                        if (document.activeElement === lastElement) {
                            e.preventDefault();
                            firstElement.focus();
                        }
                    }
                }
            });

            // Focus first element
            if (firstElement) {
                firstElement.focus();
            }
        }

        // Restore focus when modal closes
        function restoreFocus() {
            if (previousActiveElement) {
                previousActiveElement.focus();
                previousActiveElement = null;
            }
        }

        // Store current focus before opening modal
        function storeFocus() {
            previousActiveElement = document.activeElement;
        }

        // Handle ESC key for modal closing
        function handleEscapeKey(e) {
            if (e.key === 'Escape' && modalStack.length > 0) {
                const topModal = modalStack[modalStack.length - 1];
                if (topModal.onClose) {
                    topModal.onClose();
                }
            }
        }

        // Add modal to stack
        function addModalToStack(modalId, onClose) {
            modalStack.push({ id: modalId, onClose });
            if (modalStack.length === 1) {
                document.addEventListener('keydown', handleEscapeKey);
            }
        }

        // Remove modal from stack
        function removeModalFromStack(modalId) {
            modalStack = modalStack.filter(modal => modal.id !== modalId);
            if (modalStack.length === 0) {
                document.removeEventListener('keydown', handleEscapeKey);
            }
        }

        // Announce modal opening to screen readers
        function announceModalOpen(title, description = '') {
            const announcement = document.createElement('div');
            announcement.setAttribute('aria-live', 'polite');
            announcement.setAttribute('aria-atomic', 'true');
            announcement.className = 'sr-only';
            announcement.textContent = `Modal opened: ${title}. ${description}`;
            document.body.appendChild(announcement);
            
            setTimeout(() => {
                document.body.removeChild(announcement);
            }, 1000);
        }

        // Announce modal closing to screen readers
        function announceModalClose() {
            const announcement = document.createElement('div');
            announcement.setAttribute('aria-live', 'polite');
            announcement.setAttribute('aria-atomic', 'true');
            announcement.className = 'sr-only';
            announcement.textContent = 'Modal closed.';
            document.body.appendChild(announcement);
            
            setTimeout(() => {
                document.body.removeChild(announcement);
            }, 1000);
        }
        
        // Secure token storage with encryption simulation
        function setSecureToken(token, userData) {
            const authData = {
                token: token,
                user: userData,
                timestamp: Date.now(),
                expiry: Date.now() + (TOKEN_EXPIRY_HOURS * 60 * 60 * 1000)
            };
            // In production, use proper encryption
            sessionStorage.setItem(SECURE_STORAGE_KEY, JSON.stringify(authData));
        }
        
        function getSecureToken() {
            try {
                const authData = JSON.parse(sessionStorage.getItem(SECURE_STORAGE_KEY));
                if (!authData || Date.now() > authData.expiry) {
                    clearSecureStorage();
                    return null;
                }
                return authData.token;
            } catch {
                clearSecureStorage();
                return null;
            }
        }
        
        function getSecureUser() {
            try {
                const authData = JSON.parse(sessionStorage.getItem(SECURE_STORAGE_KEY));
                if (!authData || Date.now() > authData.expiry) {
                    clearSecureStorage();
                    return null;
                }
                return authData.user;
            } catch {
                clearSecureStorage();
                return null;
            }
        }
        
        function isTokenValid(token) {
            if (!token) return false;
            try {
                // Basic JWT validation (in production, use proper JWT library)
                const parts = token.split('.');
                if (parts.length !== 3) return false;
                
                const payload = JSON.parse(atob(parts[1]));
                const now = Math.floor(Date.now() / 1000);
                return payload.exp > now;
            } catch {
                return false;
            }
        }
        
        function clearSecureStorage() {
            sessionStorage.removeItem(SECURE_STORAGE_KEY);
            localStorage.removeItem('pm_auth_token');
            localStorage.removeItem('pm_user');
        }

        // Login Page Component
        function LoginPage({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            
            // FORM VALIDATION: Proper validation state management
            const [formErrors, setFormErrors] = useState({});
            const [formTouched, setFormTouched] = useState({});

            // FORM VALIDATION: Validation functions
            const validateField = (name, value) => {
                const errors = {};
                
                if (name === 'username') {
                    if (!value) {
                        errors.username = 'Username is required';
                    } else if (value.length < 3) {
                        errors.username = 'Username must be at least 3 characters';
                    }
                }
                
                if (name === 'password') {
                    if (!value) {
                        errors.password = 'Password is required';
                    } else if (value.length < 6) {
                        errors.password = 'Password must be at least 6 characters';
                    }
                }
                
                return errors;
            };

            const validateForm = () => {
                const errors = {};
                const usernameErrors = validateField('username', username);
                const passwordErrors = validateField('password', password);
                
                return { ...errors, ...usernameErrors, ...passwordErrors };
            };

            const handleFieldChange = (name, value) => {
                if (name === 'username') setUsername(value);
                if (name === 'password') setPassword(value);
                
                // Clear error when user starts typing
                if (formErrors[name]) {
                    setFormErrors(prev => ({ ...prev, [name]: '' }));
                }
            };

            const handleFieldBlur = (name) => {
                setFormTouched(prev => ({ ...prev, [name]: true }));
                
                // Validate field on blur
                const errors = validateField(name, name === 'username' ? username : password);
                setFormErrors(prev => ({ ...prev, ...errors }));
            };
            
            const handleFieldFocus = (name) => {
                // Clear error when user focuses on field
                if (formErrors[name]) {
                    setFormErrors(prev => ({ ...prev, [name]: '' }));
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                // Mark all fields as touched
                setFormTouched({ username: true, password: true });
                
                // Validate form
                const errors = validateForm();
                setFormErrors(errors);
                
                // If there are errors, don't submit
                if (Object.keys(errors).some(key => errors[key])) {
                    return;
                }
                
                setLoading(true);
                await onLogin(username, password);
                setLoading(false);
            };
            
            return React.createElement('div', { className: 'min-h-screen bg-gray-50 flex items-center justify-center' },
                h('div', { className: 'max-w-md w-full space-y-8' },
                    h('div', null,

                    ),
                    h('form', { 
                        id: 'login-form',
                        className: 'mt-8 space-y-6', 
                        onSubmit: handleSubmit,
                        noValidate: true, // Use custom validation instead of browser default
                        'aria-label': t('login.title')
                    },
                        h('div', { className: 'rounded-md shadow-sm -space-y-px' },                                                                             
                            h('div', null,
                                h('label', { className: 'sr-only', htmlFor: 'username' }, t('login.username')),                                                        
                                h('input', {
                                    id: 'username',
                                    name: 'username',
                                    type: 'text',
                                    required: true,
                                    value: username,
                                    onChange: (e) => handleFieldChange('username', e.target.value),
                                    onBlur: () => handleFieldBlur('username'),
                                    onFocus: () => handleFieldFocus('username'),
                                    className: `appearance-none rounded-none relative block w-full px-3 py-2 border ${
                                        formTouched.username && formErrors.username 
                                            ? 'border-red-300 focus:border-red-500 focus:ring-red-500' 
                                            : 'border-gray-300 focus:border-indigo-500 focus:ring-indigo-500'
                                    } placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:z-10 sm:text-sm`,
                                    placeholder: t('login.username'),
                                    'aria-invalid': formTouched.username && formErrors.username ? 'true' : 'false',
                                    'aria-describedby': formTouched.username && formErrors.username ? 'username-error' : undefined
                                }),
                                // FORM VALIDATION: Inline error message
                                formTouched.username && formErrors.username && 
                                    h('p', { 
                                        id: 'username-error',
                                        className: 'mt-1 text-sm text-red-600',
                                        role: 'alert'
                                    }, formErrors.username)
                            ),
                            h('div', null,
                                h('label', { className: 'sr-only', htmlFor: 'password' }, t('login.password')),
                                h('input', {
                                    id: 'password',
                                    name: 'password',
                                    type: 'password',
                                    required: true,
                                    value: password,
                                    onChange: (e) => handleFieldChange('password', e.target.value),
                                    onBlur: () => handleFieldBlur('password'),
                                    onFocus: () => handleFieldFocus('password'),
                                    className: `appearance-none rounded-none relative block w-full px-3 py-2 border ${

                                    placeholder: t('login.password'),

        function ProjectPage({ project, schedule, templates, onBack, onBackToRDC, onCreateSchedule, onSaveTasks }) {
            const [showTemplates, setShowTemplates] = useState(false);
            const [selectedTemplate, setSelectedTemplate] = useState(null);
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(false);
            
            const handleAddPhases = () => {
                setShowTemplates(true);
            };
            
            const handleTemplateSelect = async (template) => {
                setSelectedTemplate(template);
                setLoading(true);
                
                try {
                    // Create schedule if it doesn't exist
                    let currentSchedule = schedule;
                    if (!currentSchedule) {
                        currentSchedule = await onCreateSchedule(project.id, template);
                    }
                    
                    // Generate tasks from template
                    const generatedTasks = generateTasksFromTemplate(template, currentSchedule.id);
                    
                    // Save tasks
                    await onSaveTasks(currentSchedule.id, generatedTasks);
                    
                    setTasks(generatedTasks);
                    setShowTemplates(false);
                } catch (error) {
                    console.error('Error creating schedule:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            const generateTasksFromTemplate = (template, scheduleId) => {
                const tasks = [];
                const timestamp = Date.now();
                
                template.phases.forEach((phase, phaseIndex) => {
                    // Create phase task
                    const phaseTask = {
                        id: `phase-${phase.id}-${timestamp}`,
                        schedule_id: scheduleId,
                        name: phase.name,
                        description: phase.description,
                        type: 'phase',
                        status: 'not-started',
                        priority: 'high',
                        start_date: new Date(Date.now() + phaseIndex * 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        end_date: new Date(Date.now() + (phaseIndex + 1) * 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        estimated_hours: 0,
                        actual_hours: 0,
                        progress_percentage: 0
                    };
                    tasks.push(phaseTask);
                    
                    // Create subtasks
                    phase.tasks.forEach((task, taskIndex) => {
                        const subtask = {
                            id: `task-${phase.id}-${taskIndex}-${timestamp}`,
                            schedule_id: scheduleId,
                            parent_task_id: phaseTask.id,
                            name: task.name,
                            description: task.description,
                            type: 'task',
                            status: 'not-started',
                            priority: 'medium',
                            start_date: new Date(Date.now() + phaseIndex * 30 * 24 * 60 * 60 * 1000 + taskIndex * 5 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                            end_date: new Date(Date.now() + phaseIndex * 30 * 24 * 60 * 60 * 1000 + (taskIndex + 1) * 5 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                            estimated_hours: task.estimated_hours || 8,
                            actual_hours: 0,
                            progress_percentage: 0
                        };
                        tasks.push(subtask);
                    });
                });
                
                return tasks;
            };
            
            return h('div', { className: 'min-h-screen bg-gray-50' },

                                            }, template.description)
                                        ),
                                        h('span', { className: 'text-sm text-gray-500' }, template.estimated_duration)
                                    )
                                )
                            )
                        )
                    )
                )
            );
        }
        
        // Render the application
        ReactDOM.render(h(PMApplication), document.getElementById('root'));
    </script>
</body>
</html>
